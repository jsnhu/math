<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Multiply — Mental Math</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  #train { justify-content: flex-start; }

  /* Stacked multiplication: top number, then × + bottom number + underline */
  .question-stack {
    display: flex; flex-direction: column;
    align-items: flex-end;
    user-select: none;
    flex-shrink: 0;
  }
  .expr-num-top {
    font-weight: 800; letter-spacing: -0.04em; line-height: 1.05;
    font-size: clamp(3.5rem, 18vw, 8rem);
  }
  /* × sits left of the bottom number; underline is border-bottom of this row */
  .expr-bottom-row {
    display: flex; align-items: baseline; gap: 10px;
    border-bottom: 2.5px solid var(--border);
    padding-bottom: 5px; margin-top: 2px;
  }
  .expr-op {
    color: var(--accent); font-weight: 700;
    font-size: clamp(1.8rem, 7vw, 3.5rem); line-height: 1;
    flex-shrink: 0;
  }
  .expr-num-bot {
    font-weight: 800; letter-spacing: -0.04em; line-height: 1.05;
    font-size: clamp(3.5rem, 18vw, 8rem);
  }

  .page-topbar {
    width: 100%; display: flex; justify-content: flex-end;
    padding: 16px 20px 0; flex-shrink: 0;
  }

  /* Settings: digit steppers */
  .stepper-row  { display: flex; gap: 20px; width: 100%; }
  .stepper-col  { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .rounds-row   { display: flex; flex-direction: column; gap: 8px; }
</style>
</head>
<body>
<div class="flash-overlay" id="flashOverlay"></div>

<!-- HOME -->
<div class="screen active" id="home">
  <div class="page-topbar">
    <button class="theme-toggle" onclick="toggleTheme()"></button>
  </div>
  <div class="center-content" style="gap:28px">
    <div class="hub-title">
      <h1 style="font-size:clamp(2.5rem,12vw,5rem);letter-spacing:-0.04em">a×b</h1>
      <p>Multiplication Training</p>
    </div>
    <div style="font-size:0.8rem;color:var(--muted);" id="homeSubtitle"></div>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="startTraining()">Start</button>
      <button class="btn btn-ghost"   onclick="openSettings()">Settings</button>
      <a class="btn btn-ghost" href="index.html" style="text-align:center;text-decoration:none">← Home</a>
    </div>
  </div>
</div>

<!-- SETTINGS -->
<div class="screen" id="settings">
  <div class="center-content" style="gap:0">
    <div class="settings-body">
      <div class="settings-header">
        <button class="back-btn" onclick="saveSettings()">←</button>
        <h2>Settings</h2>
      </div>
      <div class="setting-group">
        <div class="setting-label">Digits per operand</div>
        <div class="stepper-row">
          <div class="stepper-col">
            <div class="stepper-label">First number</div>
            <div class="stepper">
              <button class="stepper-btn" onclick="adjustDigits('A',-1)">−</button>
              <div class="stepper-val" id="digitsAVal">2</div>
              <button class="stepper-btn" onclick="adjustDigits('A',+1)">+</button>
            </div>
            <div style="font-size:0.68rem;color:var(--muted);text-align:center" id="rangeHintA">10–99</div>
          </div>
          <div class="stepper-col">
            <div class="stepper-label">Second number</div>
            <div class="stepper">
              <button class="stepper-btn" onclick="adjustDigits('B',-1)">−</button>
              <div class="stepper-val" id="digitsBVal">2</div>
              <button class="stepper-btn" onclick="adjustDigits('B',+1)">+</button>
            </div>
            <div style="font-size:0.68rem;color:var(--muted);text-align:center" id="rangeHintB">10–99</div>
          </div>
        </div>
      </div>
      <div class="setting-group">
        <div class="setting-label">Questions per session</div>
        <div class="rounds-row">
          <div class="stepper">
            <button class="stepper-btn" onclick="adjustRounds(-5)">−</button>
            <div class="stepper-val" id="roundsVal">20</div>
            <button class="stepper-btn" onclick="adjustRounds(+5)">+</button>
          </div>
        </div>
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="saveSettings()">Save</button>
      </div>
    </div>
  </div>
</div>

<!-- TRAIN -->
<div class="screen" id="train">
  <div class="top-bar">
    <button class="back-btn" onclick="endSession()">←</button>
    <div class="progress-label" id="progressLabel">1 / 20</div>
  </div>
  <div class="stage">
    <div class="prompt-label">What is</div>
    <div class="question-stack">
      <span class="expr-num-top" id="numA">12</span>
      <div class="expr-bottom-row">
        <span class="expr-op">×</span>
        <span class="expr-num-bot" id="numB">34</span>
      </div>
    </div>
    <div class="answer-display empty" id="answerDisplay">
      <span class="ans-text"></span><span class="cursor"></span>
    </div>
  </div>
  <div class="numpad-area">
    <div class="numpad">
      <button class="key" data-val="7">7</button>
      <button class="key" data-val="8">8</button>
      <button class="key" data-val="9">9</button>
      <button class="key" data-val="4">4</button>
      <button class="key" data-val="5">5</button>
      <button class="key" data-val="6">6</button>
      <button class="key" data-val="1">1</button>
      <button class="key" data-val="2">2</button>
      <button class="key" data-val="3">3</button>
      <button class="key zero" data-val="0">0</button>
      <button class="key del"  data-val="del">⌫</button>
    </div>
  </div>
</div>

<!-- RESULT -->
<div class="screen" id="result">
  <div class="center-content" style="gap:16px">
    <div class="result-stat">
      <div class="big" id="resultTime">—</div>
      <div class="label">avg. seconds per question</div>
    </div>
    <div class="slowest-list" id="slowestList"></div>
    <div class="btn-group" style="margin-top:8px">
      <button class="btn btn-primary" id="retrySlowBtn" onclick="retrySlowest()" style="display:none">Retry slowest</button>
      <button class="btn btn-ghost"   onclick="startTraining()">Again</button>
      <button class="btn btn-ghost"   onclick="showScreen('home')">Home</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
  const cfg = { digitsA: 2, digitsB: 2, rounds: 20 };

  function digitRange(d) {
    if (d === 1) return '1–9';
    return `${Math.pow(10,d-1)}–${Math.pow(10,d)-1}`;
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function openSettings() { syncSettingsUI(); showScreen('settings'); }

  function syncSettingsUI() {
    document.getElementById('digitsAVal').textContent = cfg.digitsA;
    document.getElementById('digitsBVal').textContent = cfg.digitsB;
    document.getElementById('roundsVal').textContent  = cfg.rounds;
    document.getElementById('rangeHintA').textContent = digitRange(cfg.digitsA);
    document.getElementById('rangeHintB').textContent = digitRange(cfg.digitsB);
  }

  function adjustDigits(which, delta) {
    const key = which === 'A' ? 'digitsA' : 'digitsB';
    cfg[key] = Math.max(1, Math.min(4, cfg[key] + delta));
    document.getElementById(`digits${which}Val`).textContent = cfg[key];
    document.getElementById(`rangeHint${which}`).textContent = digitRange(cfg[key]);
  }

  function adjustRounds(delta) {
    cfg.rounds = Math.max(5, Math.min(100, cfg.rounds + delta));
    document.getElementById('roundsVal').textContent = cfg.rounds;
  }

  function saveSettings() { updateHomeSubtitle(); showScreen('home'); }

  function updateHomeSubtitle() {
    document.getElementById('homeSubtitle').textContent =
      `${cfg.digitsA}-digit × ${cfg.digitsB}-digit · ${cfg.rounds} questions`;
  }

  const session = { pairs: [], index: 0, typed: '', timesLog: [], questionStart: 0 };

  function buildPairs(n) {
    const pairs = [];
    for (let i = 0; i < n; i++)
      pairs.push([randomWithDigits(cfg.digitsA), randomWithDigits(cfg.digitsB)]);
    return pairs;
  }

  function startTraining() {
    session.pairs = buildPairs(cfg.rounds);
    session.index = 0;
    session.timesLog = [];
    showScreen('train');
    loadQuestion();
  }

  function retrySlowest() {
    const worst = getSlowest(session.timesLog, Math.max(3, Math.ceil(session.timesLog.length * 0.3)));
    session.pairs = shuffle(worst.map(w => w.data));
    session.index = 0;
    session.timesLog = [];
    showScreen('train');
    loadQuestion();
  }

  function loadQuestion() {
    session.typed = '';
    session.questionStart = Date.now();
    const [a, b] = session.pairs[session.index];
    document.getElementById('numA').textContent = a;
    document.getElementById('numB').textContent = b;
    document.getElementById('progressLabel').textContent = `${session.index + 1} / ${session.pairs.length}`;
    renderAnswer('', 'answerDisplay');
  }

  function handleInput(val) {
    session.typed = applyInput(session.typed, val);
    renderAnswer(session.typed, 'answerDisplay');
    const [a, b] = session.pairs[session.index];
    if (session.typed !== '' && parseInt(session.typed, 10) === a * b) {
      const t = (Date.now() - session.questionStart) / 1000;
      session.timesLog.push({ label: `${a} × ${b}`, time: t, data: [a, b] });
      markCorrect('answerDisplay');
      flashCorrect();
      setTimeout(() => {
        session.index++;
        session.index >= session.pairs.length ? showResults() : loadQuestion();
      }, 120);
    }
  }

  function endSession() { showScreen('home'); }

  function showResults() {
    const avg = session.timesLog.reduce((a, b) => a + b.time, 0) / session.timesLog.length;
    document.getElementById('resultTime').textContent = avg.toFixed(2) + 's';
    const worst = getSlowest(session.timesLog, 3);
    const listEl = document.getElementById('slowestList');
    listEl.innerHTML = '';
    if (worst.length) {
      const hdr = document.createElement('div');
      hdr.style.cssText = 'font-size:0.68rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:4px;font-weight:500;';
      hdr.textContent = 'Slowest';
      listEl.appendChild(hdr);
      worst.forEach(w => {
        const [a, b] = w.data;
        const row = document.createElement('div');
        row.className = 'slowest-item';
        row.innerHTML = `<span class="q">${w.label} = ${a*b}</span><span class="t">${w.time.toFixed(2)}s</span>`;
        listEl.appendChild(row);
      });
    }
    document.getElementById('retrySlowBtn').style.display = session.timesLog.length > 1 ? 'block' : 'none';
    showScreen('result');
  }

  wireNumpad(handleInput);
  initTheme();
  updateHomeSubtitle();
  syncSettingsUI();
</script>
</body>
</html>
